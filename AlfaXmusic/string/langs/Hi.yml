# Start Command
start_message: |
  👋 नमस्ते {username},
  
  🎵 मैं {botname} हूं, आपका स्मार्ट Telegram स्ट्रीमिंग प्लेयर!
  
  ✨ विशेषताएं:
  • YouTube और Spotify से संगीत स्ट्रीम करें
  • कतार प्रबंधन और प्लेलिस्ट समर्थन
  • व्यवस्थापक नियंत्रण और लूप/शफल
  • उच्च-गुणवत्ता ऑडियो स्ट्रीमिंग
  
  🚀 शुरू करें:
  मुझे अपने समूह में जोड़ें और /play का उपयोग करें

