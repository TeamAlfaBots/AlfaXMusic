# Start Command
start_message: |
  👋 नमस्ते {username},
  
  🎵 हम {botname} बानी, रउआ के स्मार्ट Telegram प्लेयर!
  
  ✨ खासियत:
  • YouTube आउ Spotify से गाना बजावल
  • कतार प्रबंधन आउ प्लेलिस्ट
  • एडमिन नियंत्रण आउ लूप/शफल
  • उच्च-गुणवत्ता ऑडियो स्ट्रीमिंग
  
  🚀 शुरू करीं:
  हमरा अपने ग्रुप में जोड़ीं आउ /play इस्तेमाल करीं

# Play Command
play_usage: |
  🎵 इस्तेमाल:
  /play <गाना के नाम> - खोजीं आउ बजावीं
  /play <YouTube URL> - URL से बजावीं
  /play <प्लेलिस्ट नाम> - प्लेलिस्ट बजावीं

